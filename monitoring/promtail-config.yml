server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: yinyang-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # chỉ giữ các service thuộc compose project yinyang hoặc nt208q22
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        regex: api|worker|beat|frontend
        action: keep
      # tên service (api, worker, beat, frontend)
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      # tên container đầy đủ
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      # label cố định
      - target_label: app
        replacement: yinyang
