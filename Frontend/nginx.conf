server {
    listen 80;

    # Gzip — helps Google PageSpeed score and crawl speed
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Static assets — long cache (Vite hashes filenames)
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # robots.txt and sitemap — no cache so updates are immediate
    location ~* \.(txt|xml)$ {
        root /usr/share/nginx/html;
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # React app — no cache on index.html so new deploys are picked up
    location / {
        root /usr/share/nginx/html;
        index index.html;
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
